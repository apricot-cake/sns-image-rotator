    <rect x="28" y="22" width="48" height="62" rx="7" fill="#ffffff"/>
    <!-- sun -->
    <circle cx="42" cy="38" r="6" fill="#f7b733"/>
    <!-- mountains -->
    <path d="M32 74 L48 52 L57 62 L64 54 L72 74 Z" fill="#2f5fd8"/>
  </g>
  <!-- clockwise rotate arrow around the bottom-right -->
